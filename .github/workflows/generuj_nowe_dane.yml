name: Generuj dane - NOWY

on:
  schedule:
    - cron: '0 12 * * *'   # test co 5 min
  workflow_dispatch:

jobs:
  generuj:
    runs-on: ubuntu-latest
    permissions:
      contents: write   # kluczowe – daje prawo do pusha
    steps:
      - uses: actions/checkout@v4
      - name: Ustaw Pythona
        uses: actions/setup-python@v5
        with:
          python-version: '3.14'
      - name: Instaluj pakiety
        run: pip install -r requirements.txt
      - name: Uruchom skrypt
        run: python main.py
      - name: Commit zmiany
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "Automatycznie wygenerowano nowe dane"
